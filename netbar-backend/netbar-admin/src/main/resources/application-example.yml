# ==================== JWT Token ====================
token:
  header: Authorization
  secret: YOUR_JWT_SECRET_KEY
  expireTime: 30

# ==================== MyBatis ====================
mybatis:
  typeAliasesPackage: com.ztw.netbar.**.domain
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  configLocation: classpath:mybatis/mybatis-config.xml

# ==================== PageHelper 分页 ====================
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# ==================== SpringDoc (Swagger) ====================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: '测试模块'
      paths-to-match: '/**'
      packages-to-scan: com.ztw.netbar.web.controller.tool

# ==================== 用户密码策略 ====================
user:
  password:
    maxRetryCount: 5
    lockTime: 10

# ==================== 防盗链 ====================
referer:
  enabled: false
  allowed-domains: localhost,127.0.0.1

# ==================== XSS 过滤 ====================
xss:
  enabled: true
  excludes: /system/notice
  urlPatterns: /system/*,/monitor/*,/tool/*
