# ============================================
# 警告：请将此文件复制为 application-dev.yml
#       或 application-prod.yml，并填入真实配置！
#       请勿将包含真实密码的配置文件提交至 Git 仓库！
#       application-dev.yml 已在 .gitignore 中忽略。
# ============================================

# ==================== 项目配置 ====================
netbar:
  name: NetBar
  version: 3.9.2
  copyrightYear: 2026
  profile: YOUR_UPLOAD_PATH
  addressEnabled: false
  captchaType: math

# ==================== 服务端口 ====================
server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    accept-count: 1000
    threads:
      max: 800
      min-spare: 100

# ==================== 日志 ====================
logging:
  level:
    com.ztw.netbar: debug
    org.springframework: warn

# ==================== Spring ====================
spring:
  messages:
    basename: i18n/messages
  profiles:
    active: druid
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  devtools:
    restart:
      enabled: true

  # ---------- Redis ----------
  data:
    redis:
      host: YOUR_REDIS_HOST
      port: 6379
      database: 0
      password: YOUR_REDIS_PASSWORD
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms

